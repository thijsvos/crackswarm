name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross-compilation (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Run tests
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/crack-coord${{ matrix.suffix }} dist/
          cp target/${{ matrix.target }}/release/crack-agent${{ matrix.suffix }} dist/
          cp target/${{ matrix.target }}/release/crackctl${{ matrix.suffix }} dist/
          cd dist
          tar czf ../crack-orchestrate-${{ matrix.target }}.tar.gz *

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/crack-coord${{ matrix.suffix }}" dist/
          Copy-Item "target/${{ matrix.target }}/release/crack-agent${{ matrix.suffix }}" dist/
          Copy-Item "target/${{ matrix.target }}/release/crackctl${{ matrix.suffix }}" dist/
          Compress-Archive -Path dist/* -DestinationPath "crack-orchestrate-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crack-orchestrate-${{ matrix.target }}
          path: crack-orchestrate-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
